name: .NET Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: dotnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      dotnet: ${{ steps.filter.outputs.dotnet }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect .NET file changes
      id: filter
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE="origin/${{ github.base_ref }}"
        else
          BASE="${{ github.event.before }}"
        fi

        CHANGES=$(git diff --name-only "$BASE"...HEAD 2>/dev/null || git diff --name-only "$BASE" HEAD)

        if echo "$CHANGES" | grep -qE '^(src/|tests/|.*\.csproj$|.*\.sln$|Directory\.|global\.json$|nuget\.config$|\.editorconfig$|\.github/workflows/dotnet-ci\.yml$)'; then
          echo "dotnet=true" >> "$GITHUB_OUTPUT"
          echo "Detected .NET file changes."
        else
          echo "dotnet=false" >> "$GITHUB_OUTPUT"
          echo "No .NET file changes detected."
        fi

  build-and-test:
    needs: changes
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.dotnet == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: |
          **/*.csproj
          global.json
          nuget.config

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install SonarScanner for .NET
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Restore dependencies
      run: dotnet restore

    - name: SonarCloud scan begin
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet sonarscanner begin \
          /k:"kinveetech_AarogyaBackend" \
          /o:"kinveetech" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.token="$SONAR_TOKEN" \
          /d:sonar.cs.opencover.reportsPaths=".testresults/**/coverage.opencover.xml"

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: |
        dotnet test --no-build --configuration Release --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --logger "trx;LogFileName=test-results.trx" \
          --results-directory ./.testresults \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

    - name: SonarCloud scan end
      if: always()
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

    - name: Upload test results artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./.testresults/**/*.trx
        if-no-files-found: warn

    - name: Publish test results
      if: always()
      uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5
      with:
        name: .NET Test Results
        path: ./.testresults/**/*.trx
        reporter: dotnet-trx
        fail-on-error: true

    - name: Coverage summary
      if: always() && github.event_name == 'pull_request'
      shell: bash
      run: |
        set -euo pipefail

        mapfile -t coverage_files < <(find ./.testresults -type f -name 'coverage.opencover.xml' | sort)

        if [ "${#coverage_files[@]}" -eq 0 ]; then
          {
            echo "## Code Coverage Summary"
            echo ""
            echo "No OpenCover coverage files were found in \`./.testresults\`."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        total_covered=0
        total_sequencepoints=0

        {
          echo "## Code Coverage Summary"
          echo ""
          echo "| File | Line Coverage | Covered / Total |"
          echo "|---|---:|---:|"
        } >> "$GITHUB_STEP_SUMMARY"

        for file in "${coverage_files[@]}"; do
          covered="$(grep -o 'visitedSequencePoints="[0-9]*"' "$file" | head -n1 | grep -o '[0-9]*' || true)"
          total="$(grep -o 'numSequencePoints="[0-9]*"' "$file" | head -n1 | grep -o '[0-9]*' || true)"

          covered="${covered:-0}"
          total="${total:-0}"

          total_covered=$((total_covered + covered))
          total_sequencepoints=$((total_sequencepoints + total))

          if [ "$total" -gt 0 ]; then
            pct="$(awk "BEGIN { printf \"%.2f\", (${covered}/${total}) * 100 }")"
          else
            pct="0.00"
          fi

          echo "| \`${file#./}\` | ${pct}% | ${covered} / ${total} |" >> "$GITHUB_STEP_SUMMARY"
        done

        if [ "$total_sequencepoints" -gt 0 ]; then
          total_pct="$(awk "BEGIN { printf \"%.2f\", (${total_covered}/${total_sequencepoints}) * 100 }")"
        else
          total_pct="0.00"
        fi

        {
          echo ""
          echo "**Total line coverage: ${total_pct}% (${total_covered} / ${total_sequencepoints})**"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Publish
      run: dotnet publish src/Aarogya.Api/Aarogya.Api.csproj --configuration Release --output ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-api
        path: ./publish

  lint:
    needs: changes
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' || needs.changes.outputs.dotnet == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: |
          **/*.csproj
          global.json
          nuget.config

    - name: Check code formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic --exclude src/Aarogya.Infrastructure/Persistence/Migrations

  ci:
    if: always()
    needs: [changes, build-and-test, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - name: Check required jobs
      env:
        DOTNET_CHANGED: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.dotnet == 'true' }}
        BUILD_RESULT: ${{ needs.build-and-test.result }}
        LINT_RESULT: ${{ needs.lint.result }}
      run: |
        if [[ "$DOTNET_CHANGED" != "true" ]]; then
          echo "No .NET file changes — skipping CI checks."
          exit 0
        fi
        if [[ "$BUILD_RESULT" != "success" || "$LINT_RESULT" != "success" ]]; then
          echo "Required jobs failed: build-and-test=$BUILD_RESULT, lint=$LINT_RESULT"
          exit 1
        fi
        echo "All required jobs passed."
