name: .NET Backend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: dotnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: |
          **/*.csproj
          global.json
          nuget.config

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run tests
      run: |
        dotnet test --no-build --configuration Release --verbosity normal \
          --collect:"XPlat Code Coverage" \
          --logger "trx;LogFileName=test-results.trx" \
          --results-directory ./.testresults

    - name: Upload test results artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./.testresults/**/*.trx
        if-no-files-found: warn

    - name: Publish test results
      if: always()
      uses: dorny/test-reporter@31a54ee7ebcacc03a09ea97a7e5465a47b84aea5
      with:
        name: .NET Test Results
        path: ./.testresults/**/*.trx
        reporter: dotnet-trx
        fail-on-error: true

    - name: Coverage summary
      if: always() && github.event_name == 'pull_request'
      shell: bash
      run: |
        set -euo pipefail

        mapfile -t coverage_files < <(find ./.testresults -type f -name 'coverage.cobertura.xml' | sort)

        if [ "${#coverage_files[@]}" -eq 0 ]; then
          {
            echo "## Code Coverage Summary"
            echo ""
            echo "No Cobertura coverage files were found in \`./.testresults\`."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        total_covered=0
        total_valid=0

        {
          echo "## Code Coverage Summary"
          echo ""
          echo "| File | Line Coverage | Covered / Valid |"
          echo "|---|---:|---:|"
        } >> "$GITHUB_STEP_SUMMARY"

        for file in "${coverage_files[@]}"; do
          covered="$(grep -o 'lines-covered="[0-9]*"' "$file" | head -n1 | grep -o '[0-9]*' || true)"
          valid="$(grep -o 'lines-valid="[0-9]*"' "$file" | head -n1 | grep -o '[0-9]*' || true)"

          covered="${covered:-0}"
          valid="${valid:-0}"

          total_covered=$((total_covered + covered))
          total_valid=$((total_valid + valid))

          if [ "$valid" -gt 0 ]; then
            pct="$(awk "BEGIN { printf \"%.2f\", (${covered}/${valid}) * 100 }")"
          else
            pct="0.00"
          fi

          echo "| \`${file#./}\` | ${pct}% | ${covered} / ${valid} |" >> "$GITHUB_STEP_SUMMARY"
        done

        if [ "$total_valid" -gt 0 ]; then
          total_pct="$(awk "BEGIN { printf \"%.2f\", (${total_covered}/${total_valid}) * 100 }")"
        else
          total_pct="0.00"
        fi

        {
          echo ""
          echo "**Total line coverage: ${total_pct}% (${total_covered} / ${total_valid})**"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Code Coverage Report
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: codecov/codecov-action@v3
      with:
        files: '**/coverage.cobertura.xml'

    - name: Publish
      run: dotnet publish src/Aarogya.Api/Aarogya.Api.csproj --configuration Release --output ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-api
        path: ./publish

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: |
          **/*.csproj
          global.json
          nuget.config

    - name: Check code formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic
