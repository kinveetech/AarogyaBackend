name: SonarQube Analysis

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sonarqube-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Sonar configuration
        id: sonar-config
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_HOST_URL" ] && [ -n "$SONAR_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.sonar-config.outputs.configured == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Java
        if: steps.sonar-config.outputs.configured == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install SonarScanner for .NET
        if: steps.sonar-config.outputs.configured == 'true'
        run: |
          dotnet tool update --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Begin SonarQube analysis
        if: steps.sonar-config.outputs.configured == 'true'
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_PROJECT_NAME: ${{ vars.SONAR_PROJECT_NAME }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        run: |
          PROJECT_KEY="${SONAR_PROJECT_KEY:-kinveetech_AarogyaBackend}"
          PROJECT_NAME="${SONAR_PROJECT_NAME:-AarogyaBackend}"

          ARGS=(
            /k:"$PROJECT_KEY"
            /n:"$PROJECT_NAME"
            /v:"${{ github.run_number }}"
            /d:sonar.host.url="$SONAR_HOST_URL"
            /d:sonar.token="$SONAR_TOKEN"
            /d:sonar.qualitygate.wait=true
            /d:sonar.cs.vstest.reportsPaths="**/*.trx"
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
          )

          if [ -n "$SONAR_ORGANIZATION" ]; then
            ARGS+=(/o:"$SONAR_ORGANIZATION")
          fi

          dotnet sonarscanner begin "${ARGS[@]}"

      - name: Restore
        if: steps.sonar-config.outputs.configured == 'true'
        run: dotnet restore Aarogya.sln

      - name: Build
        if: steps.sonar-config.outputs.configured == 'true'
        run: dotnet build Aarogya.sln --no-restore --configuration Release

      - name: Test with coverage
        if: steps.sonar-config.outputs.configured == 'true'
        run: |
          dotnet test Aarogya.sln \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./TestResults/coverage/

      - name: End SonarQube analysis
        if: steps.sonar-config.outputs.configured == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: SonarQube not configured
        if: steps.sonar-config.outputs.configured != 'true'
        run: |
          echo "SONAR_HOST_URL and/or SONAR_TOKEN is not configured."
          echo "Skipping SonarQube analysis."
