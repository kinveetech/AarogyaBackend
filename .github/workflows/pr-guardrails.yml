name: PR Guardrails

on:
  pull_request:
    branches: [ main ]
    types: [opened, edited, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-guardrails-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  semantic-pr-title:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|chore|refactor|perf|test|ci)(\(.+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title does not follow Conventional Commits format."
            echo ""
            echo "Expected: <type>(<optional scope>): <description>"
            echo "Allowed types: feat, fix, docs, chore, refactor, perf, test, ci"
            echo ""
            echo "Got: $PR_TITLE"
            exit 1
          fi
          echo "PR title is valid: $PR_TITLE"

  dependency-review:
    if: github.event.pull_request.draft == false && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261
        with:
          fail-on-severity: high

  dependency-review-disabled:
    if: github.event.pull_request.draft == false && vars.ENABLE_DEPENDENCY_REVIEW != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Dependency review disabled
        run: |
          echo "Dependency review skipped."
          echo "Set repository variable ENABLE_DEPENDENCY_REVIEW=true to enable this job."
