name: PR Guardrails

on:
  pull_request:
    branches: [ main ]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-guardrails-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  semantic-pr-title:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            perf
            test
            ci

  dependency-review:
    if: github.event.pull_request.draft == false && vars.ENABLE_DEPENDENCY_REVIEW == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  dependency-review-disabled:
    if: github.event.pull_request.draft == false && vars.ENABLE_DEPENDENCY_REVIEW != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dependency review disabled
        run: |
          echo "Dependency review skipped."
          echo "Set repository variable ENABLE_DEPENDENCY_REVIEW=true to enable this job."
