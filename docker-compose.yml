services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: aarogya-api:dev
    container_name: aarogya-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${DEFAULT_CONNECTION_STRING:-Host=postgres;Port=5432;Database=aarogya;Username=aarogya;Password=aarogya_dev_password}
      ConnectionStrings__Redis: ${REDIS_CONNECTION_STRING:-redis:6379}
      Jwt__Key: ${JWT_KEY:-development-key-change-this-to-32-plus-chars}
      Jwt__Issuer: ${JWT_ISSUER:-AarogyaAPI}
      Jwt__Audience: ${JWT_AUDIENCE:-AarogyaClients}
      Database__EnableDetailedErrors: "true"
      Database__EnableSensitiveDataLogging: "true"
      Database__AutoMigrateOnStartup: "true"
      Aws__Region: ${AWS_REGION:-ap-south-1}
      Aws__ServiceUrl: ${AWS_SERVICE_URL:-http://localstack:4566}
      Aws__UseLocalStack: ${AWS_USE_LOCALSTACK:-true}
      Aws__AccessKey: ${AWS_ACCESS_KEY:-test}
      Aws__SecretKey: ${AWS_SECRET_KEY:-test}
      Aws__Cognito__UserPoolName: ${AWS_COGNITO_USER_POOL_NAME:-aarogya-dev-users}
      Aws__Cognito__MfaConfiguration: ${AWS_COGNITO_MFA_CONFIGURATION:-OPTIONAL}
      Aws__Cognito__PasswordPolicy__MinimumLength: ${AWS_COGNITO_PASSWORD_MIN_LENGTH:-8}
      Aws__Cognito__PasswordPolicy__RequireLowercase: ${AWS_COGNITO_PASSWORD_REQUIRE_LOWERCASE:-true}
      Aws__Cognito__PasswordPolicy__RequireUppercase: ${AWS_COGNITO_PASSWORD_REQUIRE_UPPERCASE:-true}
      Aws__Cognito__PasswordPolicy__RequireNumbers: ${AWS_COGNITO_PASSWORD_REQUIRE_NUMBERS:-true}
      Aws__Cognito__PasswordPolicy__RequireSymbols: ${AWS_COGNITO_PASSWORD_REQUIRE_SYMBOLS:-true}
      Aws__S3__BucketName: ${AWS_S3_BUCKET_NAME:-aarogya-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
    networks:
      - aarogya-net

  postgres:
    image: postgres:16
    container_name: aarogya-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aarogya}
      POSTGRES_USER: ${POSTGRES_USER:-aarogya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aarogya_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aarogya -d aarogya"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aarogya-net

  postgres-init:
    image: postgres:16
    container_name: aarogya-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-aarogya_dev_password}
    command: >
      sh -c "until pg_isready -h postgres -U ${POSTGRES_USER:-aarogya} -d ${POSTGRES_DB:-aarogya}; do sleep 1; done &&
      psql -h postgres -U ${POSTGRES_USER:-aarogya} -d ${POSTGRES_DB:-aarogya} -c 'CREATE EXTENSION IF NOT EXISTS pgcrypto;'"
    restart: "no"
    networks:
      - aarogya-net

  redis:
    image: redis:7
    container_name: aarogya-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aarogya-net

  localstack:
    image: localstack/localstack:3
    container_name: aarogya-localstack
    environment:
      SERVICES: s3,sqs,cognito,kms,ses
      AWS_DEFAULT_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_KEY:-test}
      LOCALSTACK_HOST: localstack
      LOCALSTACK_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-aarogya-dev}
      LOCALSTACK_SQS_QUEUE_NAME: ${AWS_SQS_QUEUE_NAME:-aarogya-dev-queue}
      LOCALSTACK_COGNITO_USER_POOL_NAME: ${AWS_COGNITO_USER_POOL_NAME:-aarogya-dev-users}
      LOCALSTACK_COGNITO_MFA_CONFIGURATION: ${AWS_COGNITO_MFA_CONFIGURATION:-OPTIONAL}
      LOCALSTACK_COGNITO_PASSWORD_MIN_LENGTH: ${AWS_COGNITO_PASSWORD_MIN_LENGTH:-8}
      LOCALSTACK_COGNITO_PASSWORD_REQUIRE_LOWERCASE: ${AWS_COGNITO_PASSWORD_REQUIRE_LOWERCASE:-true}
      LOCALSTACK_COGNITO_PASSWORD_REQUIRE_UPPERCASE: ${AWS_COGNITO_PASSWORD_REQUIRE_UPPERCASE:-true}
      LOCALSTACK_COGNITO_PASSWORD_REQUIRE_NUMBERS: ${AWS_COGNITO_PASSWORD_REQUIRE_NUMBERS:-true}
      LOCALSTACK_COGNITO_PASSWORD_REQUIRE_SYMBOLS: ${AWS_COGNITO_PASSWORD_REQUIRE_SYMBOLS:-true}
      LOCALSTACK_KMS_ALIAS: ${AWS_KMS_ALIAS:-alias/aarogya-dev}
    ports:
      - "4566:4566"
    volumes:
      - ./docker/localstack/init:/etc/localstack/init/ready.d:ro
      - localstackdata:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - aarogya-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: aarogya-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@aarogya.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmindata:/var/lib/pgadmin
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost/misc/ping').read().decode().strip()=='OK' else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - aarogya-net

volumes:
  pgdata:
  redisdata:
  pgadmindata:
  localstackdata:

networks:
  aarogya-net:
    driver: bridge
