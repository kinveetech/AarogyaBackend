apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: aarogya
type: Opaque
stringData:
  POSTGRES_DB: aarogya
  POSTGRES_USER: aarogya
  POSTGRES_PASSWORD: aarogya_dev_password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: aarogya
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "aarogya", "-d", "aarogya"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: aarogya
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
