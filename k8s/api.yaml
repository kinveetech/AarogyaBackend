apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: aarogya
type: Opaque
stringData:
  Jwt__Key: development-key-change-this-to-32-plus-chars
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aarogya-api
  namespace: aarogya
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aarogya-api
  template:
    metadata:
      labels:
        app: aarogya-api
    spec:
      containers:
        - name: aarogya-api
          image: aarogya-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__DefaultConnection
              value: Host=postgres;Port=5432;Database=aarogya;Username=aarogya;Password=aarogya_dev_password
            - name: ConnectionStrings__Redis
              value: redis:6379
            - name: Jwt__Issuer
              value: AarogyaAPI
            - name: Jwt__Audience
              value: AarogyaClients
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: Jwt__Key
            - name: Database__EnableDetailedErrors
              value: "true"
            - name: Database__EnableSensitiveDataLogging
              value: "true"
            - name: Database__AutoMigrateOnStartup
              value: "true"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aarogya-api
  namespace: aarogya
spec:
  selector:
    app: aarogya-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
