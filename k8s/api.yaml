apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: aarogya
type: Opaque
stringData:
  Jwt__Key: development-key-change-this-to-32-plus-chars
  Aws__Cognito__UserPoolId: REPLACE_WITH_COGNITO_POOL_ID
  Aws__Cognito__AppClientId: REPLACE_WITH_COGNITO_CLIENT_ID
  Aws__Cognito__Issuer: REPLACE_WITH_COGNITO_ISSUER_URL
  Aws__Cognito__Domain: REPLACE_WITH_COGNITO_DOMAIN_PREFIX
  Google__ClientId: REPLACE_WITH_GOOGLE_CLIENT_ID
  Google__ClientSecret: REPLACE_WITH_GOOGLE_CLIENT_SECRET
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aarogya-api
  namespace: aarogya
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aarogya-api
  template:
    metadata:
      labels:
        app: aarogya-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-localstack
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -qO- http://localstack:4566/_localstack/health; do sleep 2; done']
      containers:
        - name: aarogya-api
          image: ghcr.io/kinveetech/aarogyabackend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Development
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__DefaultConnection
              value: Host=postgres;Port=5432;Database=aarogya;Username=aarogya;Password=aarogya_dev_password
            - name: ConnectionStrings__Redis
              value: redis:6379
            - name: Jwt__Issuer
              value: AarogyaAPI
            - name: Jwt__Audience
              value: AarogyaClients
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: Jwt__Key
            - name: Database__EnableDetailedErrors
              value: "true"
            - name: Database__EnableSensitiveDataLogging
              value: "true"
            - name: Database__AutoMigrateOnStartup
              value: "true"
            - name: Aws__Region
              value: ap-south-1
            - name: Aws__ServiceUrl
              value: http://localstack:4566
            - name: Aws__UseLocalStack
              value: "true"
            - name: Aws__AccessKey
              value: test
            - name: Aws__SecretKey
              value: test
            - name: Aws__S3__BucketName
              value: aarogya-dev
            - name: Aws__Sqs__QueueName
              value: aarogya-dev-queue
            - name: Aws__Sqs__ConfigureS3NotificationsOnStartup
              value: "true"
            - name: Aws__Sqs__EnableUploadEventConsumer
              value: "true"
            - name: Aws__Ses__SenderEmail
              value: noreply@aarogya.dev
            - name: Aws__Ses__SenderName
              value: Aarogya Dev
            - name: Aws__Cognito__UserPoolName
              value: aarogya-dev-users
            - name: Aws__Cognito__UserPoolId
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: Aws__Cognito__UserPoolId
            - name: Aws__Cognito__AppClientId
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: Aws__Cognito__AppClientId
            - name: Aws__Cognito__Issuer
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: Aws__Cognito__Issuer
            - name: Aws__Cognito__Domain
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: Aws__Cognito__Domain
            - name: Aws__Cognito__SocialIdentityProviders__AllowedRedirectUris__0
              value: "aarogya://auth/callback"
            - name: Aws__Cognito__SocialIdentityProviders__AllowedRedirectUris__1
              value: "http://localhost:3000/api/auth/callback/cognito-pkce"
            - name: Aws__Cognito__SocialIdentityProviders__Google__Enabled
              value: "true"
            - name: Aws__Cognito__SocialIdentityProviders__Google__ClientId
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: Google__ClientId
            - name: Aws__Cognito__SocialIdentityProviders__Google__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: Google__ClientSecret
            - name: Encryption__UseAwsKms
              value: "false"
            - name: Encryption__LocalDataKey
              value: aarogya-local-dev-encryption-key
            - name: Encryption__BlindIndexKey
              value: aarogya-local-dev-blind-index-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aarogya-api
  namespace: aarogya
spec:
  type: NodePort
  selector:
    app: aarogya-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
