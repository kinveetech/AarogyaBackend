apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: aarogya
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8
          ports:
            - containerPort: 80
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              value: admin@aarogya.com
            - name: PGADMIN_DEFAULT_PASSWORD
              value: admin
            - name: PGADMIN_CONFIG_SERVER_MODE
              value: "False"
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: aarogya
spec:
  type: NodePort
  selector:
    app: pgadmin
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30081
